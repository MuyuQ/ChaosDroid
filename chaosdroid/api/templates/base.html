<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ChaosDroid{% endblock %}</title>

    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>

    <!-- 基础样式 -->
    <style>
        /* 基础变量 */
        :root {
            --primary-color: #3b82f6;
            --primary-hover: #2563eb;
            --success-color: #22c55e;
            --warning-color: #f59e0b;
            --danger-color: #ef4444;
            --info-color: #06b6d4;
            --text-color: #1f2937;
            --text-muted: #6b7280;
            --border-color: #e5e7eb;
            --bg-color: #f9fafb;
            --card-bg: #ffffff;
            --nav-bg: #1f2937;
            --nav-text: #f9fafb;
        }

        /* 基础布局 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            font-size: 16px;
            line-height: 1.5;
            color: var(--text-color);
            background-color: var(--bg-color);
        }

        /* 导航栏 */
        .navbar {
            background-color: var(--nav-bg);
            color: var(--nav-text);
            padding: 0.75rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .navbar-brand {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--nav-text);
            text-decoration: none;
        }

        .navbar-nav {
            display: flex;
            gap: 1rem;
            list-style: none;
        }

        .navbar-nav a {
            color: var(--nav-text);
            text-decoration: none;
            padding: 0.5rem 1rem;
            border-radius: 0.25rem;
            transition: background-color 0.2s;
        }

        .navbar-nav a:hover,
        .navbar-nav a.active {
            background-color: rgba(255, 255, 255, 0.1);
        }

        /* 主容器 */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1.5rem;
        }

        /* 卡片 */
        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            padding: 1.5rem;
            margin-bottom: 1rem;
        }

        .card-header {
            font-size: 1.125rem;
            font-weight: 600;
            margin-bottom: 1rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid var(--border-color);
        }

        /* 按钮 */
        .btn {
            display: inline-block;
            padding: 0.5rem 1rem;
            font-size: 0.875rem;
            font-weight: 500;
            text-decoration: none;
            border: 1px solid transparent;
            border-radius: 0.25rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background-color: var(--primary-color);
            color: white;
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
        }

        .btn-secondary {
            background-color: var(--bg-color);
            color: var(--text-color);
            border-color: var(--border-color);
        }

        .btn-secondary:hover {
            background-color: var(--border-color);
        }

        .btn-success {
            background-color: var(--success-color);
            color: white;
        }

        .btn-danger {
            background-color: var(--danger-color);
            color: white;
        }

        .btn-sm {
            padding: 0.25rem 0.5rem;
            font-size: 0.75rem;
        }

        /* 表格 */
        .table {
            width: 100%;
            border-collapse: collapse;
        }

        .table th,
        .table td {
            padding: 0.75rem 1rem;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        .table th {
            font-weight: 600;
            background-color: var(--bg-color);
        }

        .table tbody tr:hover {
            background-color: var(--bg-color);
        }

        /* 状态徽章 */
        .badge {
            display: inline-block;
            padding: 0.25rem 0.5rem;
            font-size: 0.75rem;
            font-weight: 500;
            border-radius: 0.25rem;
        }

        .badge-success { background-color: var(--success-color); color: white; }
        .badge-warning { background-color: var(--warning-color); color: white; }
        .badge-danger { background-color: var(--danger-color); color: white; }
        .badge-info { background-color: var(--info-color); color: white; }
        .badge-secondary { background-color: var(--text-muted); color: white; }

        /* 状态徽章 - 执行状态 */
        .badge-queued { background-color: #6b7280; color: white; }
        .badge-preparing { background-color: #8b5cf6; color: white; }
        .badge-injecting { background-color: #f59e0b; color: white; }
        .badge-validating { background-color: #06b6d4; color: white; }
        .badge-recovering { background-color: #3b82f6; color: white; }
        .badge-passed { background-color: #22c55e; color: white; }
        .badge-failed { background-color: #ef4444; color: white; }
        .badge-partial { background-color: #f97316; color: white; }

        /* 状态徽章 - 步骤状态 */
        .badge-pending { background-color: #6b7280; color: white; }
        .badge-running { background-color: #3b82f6; color: white; }
        .badge-success-step { background-color: #22c55e; color: white; }
        .badge-failed-step { background-color: #ef4444; color: white; }
        .badge-skipped { background-color: #9ca3af; color: white; }
        .badge-timeout { background-color: #f59e0b; color: white; }

        /* 表单 */
        .form-group {
            margin-bottom: 1rem;
        }

        .form-label {
            display: block;
            font-weight: 500;
            margin-bottom: 0.5rem;
        }

        .form-control {
            width: 100%;
            padding: 0.5rem 0.75rem;
            font-size: 1rem;
            border: 1px solid var(--border-color);
            border-radius: 0.25rem;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        /* 筛选栏 */
        .filter-bar {
            display: flex;
            gap: 1rem;
            align-items: center;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }

        .filter-bar .form-group {
            margin-bottom: 0;
        }

        .filter-bar select,
        .filter-bar input {
            min-width: 150px;
        }

        /* Flash 消息 */
        .flash-messages {
            margin-bottom: 1rem;
        }

        .flash-message {
            padding: 0.75rem 1rem;
            border-radius: 0.25rem;
            margin-bottom: 0.5rem;
        }

        .flash-success {
            background-color: #d1fae5;
            color: #065f46;
            border: 1px solid #6ee7b7;
        }

        .flash-error {
            background-color: #fee2e2;
            color: #991b1b;
            border: 1px solid #fca5a5;
        }

        .flash-warning {
            background-color: #fef3c7;
            color: #92400e;
            border: 1px solid #fcd34d;
        }

        .flash-info {
            background-color: #e0f2fe;
            color: #075985;
            border: 1px solid #7dd3fc;
        }

        /* 详情页布局 */
        .detail-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .detail-title {
            font-size: 1.5rem;
            font-weight: 600;
        }

        .detail-actions {
            display: flex;
            gap: 0.5rem;
        }

        /* 属性列表 */
        .property-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 1rem;
        }

        .property-item {
            display: flex;
            flex-direction: column;
        }

        .property-label {
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        .property-value {
            font-weight: 500;
        }

        /* 时间线 */
        .timeline {
            position: relative;
            padding-left: 2rem;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 0.5rem;
            top: 0;
            bottom: 0;
            width: 2px;
            background-color: var(--border-color);
        }

        .timeline-item {
            position: relative;
            padding-bottom: 1.5rem;
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            left: -1.5rem;
            top: 0.25rem;
            width: 0.75rem;
            height: 0.75rem;
            border-radius: 50%;
            background-color: var(--border-color);
            border: 2px solid var(--card-bg);
        }

        .timeline-item.success::before { background-color: var(--success-color); }
        .timeline-item.failed::before { background-color: var(--danger-color); }
        .timeline-item.running::before { background-color: var(--primary-color); }
        .timeline-item.pending::before { background-color: var(--text-muted); }

        .timeline-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        .timeline-title {
            font-weight: 500;
        }

        .timeline-time {
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        .timeline-content {
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        /* 开关 */
        .toggle-switch {
            position: relative;
            width: 3rem;
            height: 1.5rem;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: var(--border-color);
            border-radius: 1rem;
            transition: 0.3s;
        }

        .toggle-slider::before {
            position: absolute;
            content: '';
            height: 1rem;
            width: 1rem;
            left: 0.25rem;
            bottom: 0.25rem;
            background-color: white;
            border-radius: 50%;
            transition: 0.3s;
        }

        .toggle-switch input:checked + .toggle-slider {
            background-color: var(--success-color);
        }

        .toggle-switch input:checked + .toggle-slider::before {
            transform: translateX(1.5rem);
        }

        /* HTMX 加载指示器 */
        .htmx-indicator {
            opacity: 0;
            transition: opacity 0.2s;
        }

        .htmx-request .htmx-indicator {
            opacity: 1;
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                gap: 0.5rem;
            }

            .navbar-nav {
                flex-wrap: wrap;
                justify-content: center;
            }

            .container {
                padding: 1rem;
            }

            .filter-bar {
                flex-direction: column;
            }

            .filter-bar select,
            .filter-bar input {
                width: 100%;
            }

            .detail-header {
                flex-direction: column;
                gap: 1rem;
            }

            .table {
                font-size: 0.875rem;
            }

            .table th,
            .table td {
                padding: 0.5rem;
            }

            .property-list {
                grid-template-columns: 1fr;
            }
        }
    </style>

    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <a href="/" class="navbar-brand">ChaosDroid</a>
        <ul class="navbar-nav">
            <li>
                <a href="/scenarios"
                   class="{% if request.url.path.startswith('/scenarios') %}active{% endif %}"
                   hx-boost="true">
                    场景管理
                </a>
            </li>
            <li>
                <a href="/runs"
                   class="{% if request.url.path.startswith('/runs') %}active{% endif %}"
                   hx-boost="true">
                    执行记录
                </a>
            </li>
            <li>
                <a href="/reports"
                   class="{% if request.url.path.startswith('/reports') %}active{% endif %}"
                   hx-boost="true">
                    报告查看
                </a>
            </li>
            <li>
                <a href="/devices"
                   class="{% if request.url.path.startswith('/devices') %}active{% endif %}"
                   hx-boost="true">
                    设备管理
                </a>
            </li>
        </ul>
    </nav>

    <!-- Flash 消息区域 -->
    <div class="container">
        <div class="flash-messages" id="flash-messages">
            {% if flash_messages %}
                {% for message in flash_messages %}
                    <div class="flash-message flash-{{ message.category }}">
                        {{ message.text }}
                    </div>
                {% endfor %}
            {% endif %}
        </div>
    </div>

    <!-- 主内容区域 -->
    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <!-- HTMX 配置 -->
    <script>
        htmx.config.defaultSwapStyle = 'innerHTML';
        htmx.config.defaultSwapDelay = 0;

        // 处理 Flash 消息
        document.body.addEventListener('htmx:afterSwap', function(evt) {
            if (evt.detail.target.id === 'flash-messages') {
                setTimeout(function() {
                    evt.detail.target.innerHTML = '';
                }, 5000);
            }
        });
    </script>

    {% block extra_js %}{% endblock %}
</body>
</html>
