<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TraceLens{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .nav-brand { font-weight: bold; color: #0d6efd; }
        .nav-subtitle { margin-left: 2px; }
        .status-passed { color: #198754; }
        .status-failed { color: #dc3545; }
        .status-pending { color: #6c757d; }
        .confidence-bar { height: 8px; border-radius: 4px; background: #e9ecef; }
        .confidence-fill { height: 100%; border-radius: 4px; background: #0d6efd; }
        .evidence-box { background: #f8f9fa; padding: 10px; border-radius: 4px; margin: 5px 0; font-family: monospace; font-size: 0.9em; }
        /* HTMX 加载指示器样式 */
        .htmx-indicator { opacity: 0; transition: opacity 200ms ease-in; }
        .htmx-request .htmx-indicator, .htmx-request.htmx-indicator { opacity: 1; }
        .htmx-request.htmx-indicator-spinner { display: inline-block; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light border-bottom">
        <div class="container">
            <span class="navbar-brand">
                <a class="nav-brand" href="/" style="text-decoration: none; color: #0d6efd; font-weight: bold; font-size: 1.3em;">TraceLens</a><small class="text-muted d-none d-md-inline" style="margin-left: 4px; font-size: 0.65em;">Android升级诊断工作台</small>
            </span>
            <div class="navbar-nav">
                <a class="nav-link" href="/">仪表盘</a>
                <a class="nav-link" href="/import">导入</a>
                <a class="nav-link" href="/runs">任务列表</a>
                <a class="nav-link" href="/cases">故障检索</a>
                <a class="nav-link" href="/rules">规则管理</a>
                <a class="nav-link" href="/api-docs">API文档</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>

    <footer class="text-center text-muted py-4 mt-5">
        <small>TraceLens - Android Upgrade Diagnostic Workbench</small>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/htmx@2.0.4/dist/htmx.min.js"></script>
    {% block scripts %}{% endblock %}
    <script>
        // CSRF token 自动注入到表单
        (function() {
            // 从 cookie 获取 CSRF token
            function getCsrfTokenFromCookie() {
                const cookies = document.cookie.split(';');
                for (let cookie of cookies) {
                    const [name, value] = cookie.trim().split('=');
                    if (name === 'csrf_token') {
                        return value;
                    }
                }
                return null;
            }

            // 为所有表单添加 CSRF token
            document.addEventListener('DOMContentLoaded', function() {
                const csrfToken = getCsrfTokenFromCookie();
                if (csrfToken) {
                    document.querySelectorAll('form[method="post"]').forEach(function(form) {
                        // 检查是否已经有 CSRF token 字段
                        if (!form.querySelector('input[name="csrf_token"]')) {
                            const input = document.createElement('input');
                            input.type = 'hidden';
                            input.name = 'csrf_token';
                            input.value = csrfToken;
                            form.appendChild(input);
                        }
                    });
                }
            });

            // 为 HTMX 请求添加 CSRF token header
            document.body.addEventListener('htmx:configRequest', function(event) {
                const csrfToken = getCsrfTokenFromCookie();
                if (csrfToken) {
                    event.detail.headers['X-CSRF-Token'] = csrfToken;
                }
            });
        })();
    </script>
</body>
</html>
