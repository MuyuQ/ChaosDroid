<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ChaosDroid - Android 故障注入测试与恢复验证平台">
    <title>{% block title %}ChaosDroid{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://unpkg.com/htmx.org@1.9.6"></script>
    <style>
        /* 焦点样式增强 */
        a:focus-visible,
        button:focus-visible,
        input:focus-visible,
        select:focus-visible,
        [tabindex]:focus-visible {
            outline: 2px solid var(--primary-color, #2563eb);
            outline-offset: 2px;
        }
    </style>
</head>
<body>

    {% if csrf_token is defined %}
    <!-- CSRF Token 隐藏存储 -->
    <input type="hidden" id="csrf-token" value="{{ csrf_token }}" aria-hidden="true">

    <script>
        // HTMX CSRF 保护：自动为所有 POST/PUT/DELETE 请求添加 CSRF token 到请求头
        document.body.addEventListener('htmx:configRequest', function(evt) {
            var method = evt.detail.method.toUpperCase();
            if (method === 'POST' || method === 'PUT' || method === 'DELETE') {
                var csrfToken = document.getElementById('csrf-token')?.value || getCsrfTokenFromCookie();
                if (csrfToken) {
                    evt.detail.headers['X-CSRF-Token'] = csrfToken;
                }
            }
        });

        // 从 cookie 获取 CSRF token（备用方案）
        function getCsrfTokenFromCookie() {
            var cookies = document.cookie.split(';');
            for (var i = 0; i < cookies.length; i++) {
                var cookie = cookies[i].trim();
                if (cookie.startsWith('csrf_token=')) {
                    return cookie.substring('csrf_token='.length);
                }
            }
            return null;
        }
    </script>
    {% endif %}

    <nav class="navbar" role="navigation" aria-label="主导航">
        <div class="container">
            <a href="/" class="navbar-brand" aria-label="ChaosDroid 首页">
                <strong>ChaosDroid</strong>
            </a>
            <button
                type="button"
                class="navbar-toggle"
                aria-expanded="false"
                aria-controls="navbar-menu"
                aria-label="切换导航菜单"
                onclick="toggleNavbar()">
                ☰
            </button>
            <ul class="navbar-nav" id="navbar-menu" role="menubar">
                <li role="none"><a href="/" role="menuitem">仪表盘</a></li>
                <li role="none"><a href="/devices" role="menuitem">设备管理</a></li>
                <li role="none"><a href="/runs" role="menuitem">任务列表</a></li>
                <li role="none"><a href="/diagnosis" role="menuitem">日志诊断</a></li>
            </ul>
        </div>
    </nav>

    <main id="main-content" class="main-content" role="main" tabindex="-1">
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>

    <footer role="contentinfo" style="text-align: center; padding: 2rem; color: var(--text-muted);">
        <p>ChaosDroid - Android fault injection testing and recovery verification platform</p>
    </footer>

    <script>
        // 移动端导航切换
        function toggleNavbar() {
            var menu = document.getElementById('navbar-menu');
            var toggle = document.querySelector('.navbar-toggle');
            var expanded = toggle.getAttribute('aria-expanded') === 'true';
            toggle.setAttribute('aria-expanded', !expanded);
            menu.classList.toggle('show');
        }

        // 页面加载时聚焦到主内容（如果通过跳转链接到达）
        document.addEventListener('DOMContentLoaded', function() {
            if (window.location.hash === '#main-content') {
                document.getElementById('main-content').focus();
            }
        });
    </script>

    {% block scripts %}{% endblock %}
</body>
</html>
